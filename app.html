<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HayMoi | استكشف محيطك</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=3.5">
</head>

<body class="app-body">

    <!-- تمت إزالة الفيديو الخلفي الثقيل وتعويضه بخلفية متحركة خفيفة بالـ CSS -->
    <div class="video-overlay"></div>

    <!-- شاشة الترحيب الفاخرة (Splash Screen) -->
    <div class="splash-screen" id="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <span class="splash-logo-text">HayMoi</span>
            </div>
            <h1 class="splash-brand">مرحبا بك في موقع HayMoi</h1>
            <p class="splash-tagline">استكشف الناس القريبة لك بكل ارتياحية</p>
            <div class="splash-loader">
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
            </div>
        </div>
    </div>

    <!-- الحاوية الرئيسية للتطبيق -->
    <div class="app-container">

        <!-- التبويب العلوي الخاص بقسم Trouver -->
        <header class="app-header" id="app-header">
            <!-- صورتنا الشخصية في اليسار للوصول السريع للبروفايل -->
            <div class="header-user-avatar" id="header-user-avatar" title="الملف الشخصي">?</div>

            <!-- عنوان التطبيق في الوسط -->
            <span class="header-title" id="header-title">Trouver</span>

            <!-- أزرار التنقل في الأعلى -->
            <div class="top-nav-tabs" style="display: none;">
                <!-- Hide tabs since search is now embedded -->
            </div>
        </header>

        <!-- المحتوى الرئيسي المتغير حسب التبويب المفتوح -->
        <main class="app-content">

            <!-- 1. قسم الاستكشاف (Trouver) -->
            <section id="view-trouver" class="app-view active">
                <div class="users-list" id="users-list-container">
                    <div class="loading-spinner">
                        <i class="fas fa-spinner fa-spin"></i> جاري البحث عن أشخاص قريبين...
                    </div>
                </div>
            </section>

            <!-- 2. قسم الدردشات (Chats) -->
            <section id="view-chats" class="app-view">
                <div class="chats-list" id="chats-list-container">
                    <div class="empty-state">
                        <i class="fas fa-comments"></i>
                        <p>لا توجد محادثات نشطة حالياً.</p>
                    </div>
                </div>
            </section>

            <!-- 3. قسم جهات الاتصال (Contacts) -->
            <section id="view-contacts" class="app-view">
                <div class="contacts-list" id="contacts-list-container">
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <p>لا توجد جهات اتصال حالياً.</p>
                    </div>
                </div>
            </section>

            <!-- 4. قسم الملف الشخصي (Profil) -->
            <section id="view-profil" class="app-view">
                <div class="own-profile" id="own-profile-container">
                    <div class="loading-spinner">
                        <i class="fas fa-spinner fa-spin"></i> جاري تحميل الملف الشخصي...
                    </div>
                </div>
            </section>

        </main>

        <!-- شريط التنقل السفلي السحري -->
        <nav class="bottom-nav" style="--active-idx: 0;">
            <button class="nav-item active" id="btn-nav-trouver">
                <span class="icon"><i class="fas fa-location-dot"></i></span>
                <span class="text">trouver</span>
            </button>
            <button class="nav-item" id="btn-nav-chats">
                <span class="icon">
                    <i class="fas fa-comment"></i>
                    <span class="badge" id="chats-unread-badge" style="display:none;">0</span>
                </span>
                <span class="text">chats</span>
            </button>
            <button class="nav-item" id="btn-nav-contacts">
                <span class="icon"><i class="fas fa-address-book"></i></span>
                <span class="text">contacts</span>
            </button>
            <button class="nav-item" id="btn-nav-profil">
                <span class="icon"><i class="fas fa-id-card"></i></span>
                <span class="text">profil</span>
            </button>
            <div class="indicator-wrapper">
                <div class="indicator-circle"></div>
            </div>
        </nav>

    </div>

    <!-- نافذة تفاصيل العضو (Modal Profile) -->
    <div class="modal" id="user-detail-modal">
        <div class="modal-content glass-card">
            <span class="close-modal-btn" id="close-detail-modal">&times;</span>
            <div id="modal-user-profile-data">
                <!-- بيانات العضو عند الضغط عليه -->
            </div>
        </div>
    </div>

    <!-- نافذة الدردشة المباشرة (Chat Window) -->
    <div class="chat-window" id="chat-window">
        <div class="chat-header">
            <button class="chat-back-btn" id="chat-back-btn" title="رجوع">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="chat-user-info-header">
                <span class="chat-user-name" id="chat-user-name">اسم المستخدم</span>
                <span class="chat-user-status" id="chat-user-status"></span>
            </div>
            <div class="chat-header-actions">
                <button class="chat-header-btn" id="chat-profile-btn" title="الملف الشخصي">
                    <i class="fas fa-user"></i>
                </button>
                <button class="chat-header-btn" id="chat-menu-btn" title="المزيد">
                    <i class="fas fa-ellipsis-vertical"></i>
                </button>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages-container">
            <!-- الرسائل تظهر هنا ديناميكياً -->
        </div>
        <div class="chat-input-area">
            <button class="chat-attach-btn" id="chat-img-btn" title="إرفاق ملف">
                <i class="fas fa-plus"></i>
            </button>
            <div class="emoji-picker-wrapper" style="position: relative; display: flex; align-items: center;">
                <button class="chat-emoji-btn" id="chat-emoji-btn" title="إيموجي">
                    <i class="far fa-smile"></i>
                </button>
                <div class="emoji-picker-popover" id="emoji-picker-popover" style="display: none;">
                    <span class="emoji-item">😊</span>
                    <span class="emoji-item">😂</span>
                    <span class="emoji-item">😍</span>
                    <span class="emoji-item">🥰</span>
                    <span class="emoji-item">😘</span>
                    <span class="emoji-item">👍</span>
                    <span class="emoji-item">❤️</span>
                    <span class="emoji-item">🔥</span>
                    <span class="emoji-item">🎉</span>
                    <span class="emoji-item">✨</span>
                    <span class="emoji-item">🤔</span>
                    <span class="emoji-item">😭</span>
                    <span class="emoji-item">🥺</span>
                    <span class="emoji-item">😎</span>
                    <span class="emoji-item">🙌</span>
                    <span class="emoji-item">👏</span>
                    <span class="emoji-item">💯</span>
                    <span class="emoji-item">🌹</span>
                    <span class="emoji-item">🎈</span>
                    <span class="emoji-item">👀</span>
                </div>
            </div>
            <input type="text" id="chat-input" placeholder="Dites quelque chose..." autocomplete="off">
            <button class="chat-mic-btn" id="chat-audio-btn" title="تسجيل صوتي">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="chat-send-btn" id="chat-send-btn" title="إرسال" style="display:none;">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        <!-- مؤشر التسجيل الصوتي -->
        <div class="recording-indicator" id="recording-indicator" style="display:none;">
            <div class="recording-pulse"></div>
            <span class="recording-timer" id="recording-timer">00:00</span>
            <span class="recording-text">جاري التسجيل...</span>
            <button class="recording-stop-btn" id="recording-stop-btn" title="إيقاف وإرسال">
                <i class="fas fa-stop"></i>
            </button>
            <button class="recording-cancel-btn" id="recording-cancel-btn" title="إلغاء">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
        <!-- input مخفي لرفع الصور -->
        <input type="file" id="chat-img-input" accept="image/*" style="display:none;">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js?v=3.0"></script>
</body>

</html>
