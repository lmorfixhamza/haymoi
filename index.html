<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكشف محيطك | HayMoi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <!-- الخلفية المتحركة للفيديو (ريندر فخم جداً) -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="Vidéo sans titre.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="container">
        <h1 class="login-title">
            <span class="title-top">Bienvenue sur</span>
            <span class="title-middle brand-highlight">HayMoi</span>
        </h1>
        <p>اكتشف الأشخاص القريبة منك بلمسة زر</p>

        <div class="social-login">
            <button id="login-btn" class="btn btn-login">
                <i class="fab fa-google"></i> تسجيل الدخول بـ Google
            </button>
            <button id="tiktok-btn" class="btn btn-tiktok">
                <i class="fab fa-tiktok"></i> تسجيل الدخول بـ TikTok
            </button>
            <button id="facebook-btn" class="btn btn-facebook">
                <i class="fab fa-facebook"></i> تسجيل الدخول بـ Facebook
            </button>
        </div>
        
        <div class="footer-links">
            <a href="privacy.html">سياسة الخصوصية</a> • 
            <a href="terms.html">شروط الاستخدام</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js?v=2.2"></script>
</body>
</html>
