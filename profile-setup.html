<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compléter le profil | HayMoi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <!-- خلفية CSS بدون فيديو - أخف بكثير على الهواتف -->
    <div class="video-overlay"></div>

    <!-- زدنا 'setup-box' باش نتحكمو فالشكل ديال هاد الصفحة بوحدها -->
    <div class="container setup-box">
        <h2>Compléter vos informations <span class="brand-title">HayMoi</span></h2>
        <p>Bienvenue ! Veuillez saisir les informations suivantes pour configurer votre compte.</p>

        <form id="profile-form">
            <div class="input-group">
                <label for="fullName">Nom (ou pseudo) :</label>
                <input type="text" id="fullName" placeholder="Ex: Ahmed" required>
            </div>

            <div class="input-group">
                <label for="gender">Genre :</label>
                <select id="gender" required>
                    <option value="" disabled selected>Choisir le genre...</option>
                    <option value="male">Homme</option>
                    <option value="female">Femme</option>
                </select>
            </div>

            <div class="input-group">
                <label for="dob">Date de naissance (pour calculer l'âge) :</label>
                <input type="date" id="dob" required>
            </div>

            <div class="input-group">
                <label for="bio">À propos de moi (Bio) :</label>
                <textarea id="bio" rows="3" placeholder="Écrivez quelque chose pour attirer l'attention..."></textarea>
            </div>

            <details class="extra-details" style="margin: 20px 0; border: 1px solid rgba(255, 255, 255, 0.08); padding: 14px; border-radius: 14px; background: rgba(255, 255, 255, 0.02);">
                <summary style="font-weight: 700; color: var(--color-primary); cursor: pointer; user-select: none; outline: none; display: flex; align-items: center; justify-content: space-between;">
                    <span><i class="fas fa-sliders-h" style="margin-right: 8px;"></i> Détails supplémentaires (optionnel)</span>
                    <i class="fas fa-chevron-down" style="font-size: 12px;"></i>
                </summary>
                
                <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 15px;">
                    <div class="input-group">
                        <label for="height">Taille :</label>
                        <input type="text" id="height" placeholder="Ex: 175 cm">
                    </div>

                    <div class="input-group">
                        <label for="residence">Lieu de résidence :</label>
                        <input type="text" id="residence" placeholder="Ex: Casablanca">
                    </div>

                    <div class="input-group">
                        <label for="income">Revenu annuel :</label>
                        <select id="income">
                            <option value="" selected>Choisir le revenu annuel...</option>
                            <option value="Moins de 10 000 €">Moins de 10 000 €</option>
                            <option value="10 000 € - 30 000 €">10 000 € - 30 000 €</option>
                            <option value="30 000 € - 60 000 €">30 000 € - 60 000 €</option>
                            <option value="60 000 € - 80 000 €">60 000 € - 80 000 €</option>
                            <option value="Plus de 80 000 €">Plus de 80 000 €</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="profession">Profession :</label>
                        <input type="text" id="profession" placeholder="Ex: Ingénieur, employé...">
                    </div>

                    <div class="input-group">
                        <label for="company">Entreprise / Organisation :</label>
                        <input type="text" id="company" placeholder="Ex: Indépendant, entreprise...">
                    </div>

                    <div class="input-group">
                        <label for="body_type">Morphologie :</label>
                        <select id="body_type">
                            <option value="" selected>Choisir la morphologie...</option>
                            <option value="Mince">Mince</option>
                            <option value="Moyen">Moyen</option>
                            <option value="Athlétique">Athlétique</option>
                            <option value="Rond">Rond</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="ethnicity">Origine ethnique :</label>
                        <input type="text" id="ethnicity" placeholder="Ex: Arabe, Amazigh...">
                    </div>

                    <div class="input-group">
                        <label for="hair_color">Couleur des cheveux :</label>
                        <input type="text" id="hair_color" placeholder="Ex: Noir, châtain...">
                    </div>
                </div>
            </details>

            <button type="submit" class="btn btn-submit">Enregistrer et continuer</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js?v=2.2"></script>
    <script src="setup.js?v=2.2"></script>
</body>
</html>
