<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إكمال البيانات | HayMoi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <!-- الخلفية المتحركة للفيديو (ريندر فخم جداً) -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="Vidéo sans titre.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <!-- زدنا 'setup-box' باش نتحكمو فالشكل ديال هاد الصفحة بوحدها -->
    <div class="container setup-box">
        <h2>إكمال البيانات الشخصية <span class="brand-title">HayMoi</span></h2>
        <p>مرحباً بك! يُرجى إدخال المعلومات التالية لاستكمال إعداد حسابك.</p>

        <form id="profile-form">
            <div class="input-group">
                <label for="fullName">الاسم (أو اسم مستعار):</label>
                <input type="text" id="fullName" placeholder="مثال: أحمد" required>
            </div>

            <div class="input-group">
                <label for="gender">الجنس:</label>
                <select id="gender" required>
                    <option value="" disabled selected>اختر الجنس...</option>
                    <option value="male">ذكر</option>
                    <option value="female">أنثى</option>
                </select>
            </div>

            <div class="input-group">
                <label for="dob">تاريخ الازدياد (لحساب العمر):</label>
                <input type="date" id="dob" required>
            </div>

            <div class="input-group">
                <label for="bio">نبذة عني (Bio):</label>
                <textarea id="bio" rows="3" placeholder="اكتب شيء لتجلب الانتباه..."></textarea>
            </div>

            <details class="extra-details" style="margin: 20px 0; border: 1px solid rgba(255, 255, 255, 0.08); padding: 14px; border-radius: 14px; background: rgba(255, 255, 255, 0.02);">
                <summary style="font-weight: 700; color: var(--color-primary); cursor: pointer; user-select: none; outline: none; display: flex; align-items: center; justify-content: space-between;">
                    <span><i class="fas fa-sliders-h" style="margin-left: 8px;"></i> تفاصيل إضافية للبروفايل (اختياري)</span>
                    <i class="fas fa-chevron-down" style="font-size: 12px;"></i>
                </summary>
                
                <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 15px;">
                    <div class="input-group">
                        <label for="height">الطول (Taille):</label>
                        <input type="text" id="height" placeholder="مثال: 175 سم">
                    </div>

                    <div class="input-group">
                        <label for="residence">مكان الإقامة (Résidence):</label>
                        <input type="text" id="residence" placeholder="مثال: الدار البيضاء">
                    </div>

                    <div class="input-group">
                        <label for="income">الدخل السنوي (Revenu annuel):</label>
                        <select id="income">
                            <option value="" selected>اختر الدخل السنوي...</option>
                            <option value="أقل من 10,000 €">أقل من 10,000 €</option>
                            <option value="10,000 € - 30,000 €">10,000 € - 30,000 €</option>
                            <option value="30,000 € - 60,000 €">30,000 € - 60,000 €</option>
                            <option value="60,000 € - 80,000 €">60,000 € - 80,000 €</option>
                            <option value="أكثر من 80,000 €">أكثر من 80,000 €</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="profession">المهنة (Profession):</label>
                        <input type="text" id="profession" placeholder="مثال: مهندس، موظف...">
                    </div>

                    <div class="input-group">
                        <label for="company">الشركة/المؤسسة (Société):</label>
                        <input type="text" id="company" placeholder="مثال: مستقل، شركة...">
                    </div>

                    <div class="input-group">
                        <label for="body_type">بنية الجسم (Morphologie):</label>
                        <select id="body_type">
                            <option value="" selected>اختر بنية الجسم...</option>
                            <option value="نحيف">نحيف</option>
                            <option value="متوسط">متوسط</option>
                            <option value="رياضي">رياضي</option>
                            <option value="ممتلئ">ممتلئ</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="ethnicity">الأصل العرقي (Origine ethnique):</label>
                        <input type="text" id="ethnicity" placeholder="مثال: عربي، أمازيغي...">
                    </div>

                    <div class="input-group">
                        <label for="hair_color">لون الشعر (Couleur des cheveux):</label>
                        <input type="text" id="hair_color" placeholder="مثال: أسود، بني...">
                    </div>
                </div>
            </details>

            <button type="submit" class="btn btn-submit">حفظ ومتابعة</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js?v=2.2"></script>
    <script src="setup.js?v=2.2"></script>
</body>
</html>
