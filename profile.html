<!DOCTYPE html>
<html lang="fr" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon profil | HayMoi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=3.5">
</head>

<body>
    <div class="container profile-box">
        <div class="profile-header">
            <div class="profile-avatar" id="profile-avatar">
                <!-- سيتم وضع الأيقونة ديناميكياً بناء على الجنس -->
                <i class="fas fa-user-circle"></i>
            </div>
            <h1 id="profile-fullname">Chargement...</h1>
        </div>

        <div class="profile-details">
            <div class="detail-item">
                <span class="detail-label"><i class="fas fa-calendar-day"></i> Âge :</span>
                <span class="detail-value" id="profile-age">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label"><i class="fas fa-venus-mars"></i> Genre :</span>
                <span class="detail-value" id="profile-gender">-</span>
            </div>
            <div class="detail-item bio-item">
                <span class="detail-label"><i class="fas fa-comment-dots"></i> À propos de moi :</span>
                <p class="detail-value bio-text" id="profile-bio">-</p>
            </div>
        </div>

        <button id="logout-btn" class="btn btn-logout"><i class="fas fa-sign-out-alt"></i> Se déconnecter</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js?v=2.2"></script>
</body>

</html>
