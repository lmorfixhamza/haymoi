<!DOCTYPE html>
<html lang="fr" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HayMoi | Explorez votre entourage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Tajawal:wght@400;700&display=swap"
        as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Tajawal:wght@400;700&display=swap">
    </noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </noscript>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>
    <link rel="stylesheet" href="style.css?v=3.6">
</head>

<body class="app-body">

    <!-- تمت إزالة الفيديو الخلفي الثقيل وتعويضه بخلفية متحركة خفيفة بالـ CSS -->
    <div class="video-overlay"></div>



    <!-- الحاوية الرئيسية للتطبيق -->
    <div class="app-container">

        <!-- التبويب العلوي الخاص بقسم Trouver -->
        <header class="app-header" id="app-header">
            <!-- صورتنا الشخصية في اليسار للوصول السريع للبروفايل -->
            <div class="header-user-avatar" id="header-user-avatar" title="Profil">?</div>

            <!-- حاوية البحث والتصفية مدمجة في الهيدر -->
            <div class="header-search-container" id="header-search-container">
                <div class="search-input-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="discovery-search-input" placeholder="Rechercher par ID..."
                        data-i18n-placeholder="discovery_search_placeholder" autocomplete="off">
                    <button id="clear-search-btn"
                        style="display: none; background:none; border:none; color:var(--text-muted); cursor:pointer;"><i
                            class="fas fa-times"></i></button>
                </div>
                <button id="advanced-filter-btn" class="header-filter-btn" title="Filtre avancé">
                    <i class="fas fa-filter"></i>
                </button>
                <button id="refresh-btn" class="header-filter-btn" title="Actualiser">
                    <i class="fas fa-rotate-right"></i>
                </button>
            </div>

            <!-- عنوان التطبيق في الوسط -->
            <span class="header-title" id="header-title" translate="no" style="display: none;">Trouver</span>

            <!-- زر الإعدادات في أعلى اليمين عند عرض البروفايل -->
            <button id="header-settings-btn"
                style="display: none; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-white); font-size: 22px; cursor: pointer; padding: 8px; z-index: 100;"
                title="Paramètres">
                <i class="fas fa-cog"></i>
            </button>

            <!-- زر الإنشاء في أعلى اليمين عند عرض المحادثات -->
            <button id="header-compose-btn"
                style="display: none; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: linear-gradient(135deg, #ff3366, #db2777); border: none; color: #ffffff; border-radius: 12px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; z-index: 100; box-shadow: 0 4px 10px rgba(255, 51, 102, 0.3);"
                title="Nouvelle discussion">
                <i class="fas fa-edit"></i>
            </button>

            <!-- أزرار التنقل في الأعلى -->
            <div class="top-nav-tabs" style="display: none;">
                <!-- Hide tabs since search is now embedded -->
            </div>
        </header>

        <!-- المحتوى الرئيسي المتغير حسب التبويب المفتوح -->
        <main class="app-content">

            <!-- 1. قسم الاستكشاف (Trouver) -->
            <section id="view-trouver" class="app-view active">
                <div class="users-list" id="users-list-container">
                    <div class="loading-spinner">
                        <i class="fas fa-spinner fa-spin"></i> <span data-i18n="loading_people">Recherche de personnes
                            proches...</span>
                    </div>
                </div>
            </section>

            <!-- قسم Pour toi (منشورات عامة) -->
            <section id="view-pourtoi" class="app-view">
                <div class="pourtoi-feed" id="pourtoi-feed-container">
                    <!-- Dynamic mockup posts will be loaded here -->
                </div>
            </section>

            <!-- قسم الخريطة (Map) -->
            <section id="view-map" class="app-view">
                <div id="interactive-map-container">
                    <!-- Map will be mounted here -->
                </div>
            </section>

            <!-- 2. قسم الدردشات (Chats) -->
            <section id="view-chats" class="app-view">
                <div class="chats-list" id="chats-list-container">
                    <div class="empty-state">
                        <i class="fas fa-comments"></i>
                        <p data-i18n="chats_empty_msg">Aucune conversation active pour le moment.</p>
                    </div>
                </div>
            </section>

            <!-- 3. قسم جهات الاتصال (Contacts) -->
            <section id="view-contacts" class="app-view">
                <div class="contacts-list" id="contacts-list-container">
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <p data-i18n="contacts_empty_msg">Aucun contact pour le moment.</p>
                    </div>
                </div>
            </section>

            <!-- 4. قسم الملف الشخصي (Profil) -->
            <section id="view-profil" class="app-view">
                <div class="own-profile" id="own-profile-container">
                    <div class="loading-spinner">
                        <i class="fas fa-spinner fa-spin"></i> <span data-i18n="loading_profile">Chargement du
                            profil...</span>
                    </div>
                </div>
            </section>

        </main>

        <!-- شريط التنقل السفلي السحري -->
        <nav class="bottom-nav" style="--active-idx: 0;">
            <button class="nav-item active" id="btn-nav-trouver">
                <span class="icon"><i class="fas fa-location-dot"></i></span>
                <span class="text" data-i18n="nav_trouver">trouver</span>
            </button>
            <button class="nav-item" id="btn-nav-chats">
                <span class="icon">
                    <i class="fas fa-comment"></i>
                    <span class="badge" id="chats-unread-badge" style="display:none;">0</span>
                </span>
                <span class="text" data-i18n="nav_chats">chats</span>
            </button>
            <button class="nav-item" id="btn-nav-contacts">
                <span class="icon"><i class="fas fa-address-book"></i></span>
                <span class="text" data-i18n="nav_contacts">contacts</span>
            </button>
            <button class="nav-item" id="btn-nav-profil">
                <span class="icon"><i class="fas fa-id-card"></i></span>
                <span class="text" data-i18n="nav_profil">profil</span>
            </button>
            <div class="indicator-wrapper">
                <div class="indicator-circle"></div>
            </div>
        </nav>

    </div>

    <!-- نافذة تفاصيل العضو (Modal Profile) -->
    <div class="modal" id="user-detail-modal">
        <div class="modal-content glass-card">
            <span class="close-modal-btn" id="close-detail-modal">&times;</span>
            <div id="modal-user-profile-data">
                <!-- بيانات العضو عند الضغط عليه -->
            </div>
        </div>
    </div>

    <!-- نافذة الدردشة المباشرة (Chat Window) -->
    <div class="chat-window" id="chat-window">
        <div class="chat-header">
            <button class="chat-back-btn" id="chat-back-btn" title="Retour">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="chat-user-info-header">
                <span class="chat-user-name" id="chat-user-name">Nom d'utilisateur</span>
                <span class="chat-user-status" id="chat-user-status"></span>
            </div>
            <div class="chat-header-actions">
                <button class="chat-header-btn" id="chat-profile-btn" title="Profil">
                    <i class="fas fa-user"></i>
                </button>
                <button class="chat-header-btn" id="chat-menu-btn" title="Plus">
                    <i class="fas fa-ellipsis-vertical"></i>
                </button>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages-container">
            <!-- الرسائل تظهر هنا ديناميكياً -->
        </div>
        <div class="chat-input-area">
            <button class="chat-attach-btn" id="chat-img-btn" title="Joindre un fichier">
                <i class="fas fa-plus"></i>
            </button>
            <div class="emoji-picker-wrapper" style="position: relative; display: flex; align-items: center;">
                <button class="chat-emoji-btn" id="chat-emoji-btn" title="Émoticône">
                    <i class="far fa-smile"></i>
                </button>
                <div class="emoji-picker-popover" id="emoji-picker-popover" style="display: none;">
                    <span class="emoji-item">😊</span>
                    <span class="emoji-item">😂</span>
                    <span class="emoji-item">😍</span>
                    <span class="emoji-item">🥰</span>
                    <span class="emoji-item">😘</span>
                    <span class="emoji-item">👍</span>
                    <span class="emoji-item">❤️</span>
                    <span class="emoji-item">🔥</span>
                    <span class="emoji-item">🎉</span>
                    <span class="emoji-item">✨</span>
                    <span class="emoji-item">🤔</span>
                    <span class="emoji-item">😭</span>
                    <span class="emoji-item">🥺</span>
                    <span class="emoji-item">😎</span>
                    <span class="emoji-item">🙌</span>
                    <span class="emoji-item">👏</span>
                    <span class="emoji-item">💯</span>
                    <span class="emoji-item">🌹</span>
                    <span class="emoji-item">🎈</span>
                    <span class="emoji-item">👀</span>
                </div>
            </div>
            <input type="text" id="chat-input" placeholder="Dites quelque chose..."
                data-i18n-placeholder="chat_input_placeholder" autocomplete="off">
            <button class="chat-send-btn" id="chat-send-btn" title="Envoyer" style="display:none;">
                <i class="fas fa-paper-plane"></i>
            </button>
            <button class="chat-mic-btn" id="chat-audio-btn" title="Enregistrement vocal">
                <i class="fas fa-microphone"></i>
            </button>
        </div>
        <!-- مؤشر التسجيل الصوتي -->
        <div class="recording-indicator" id="recording-indicator" style="display:none;">
            <div class="recording-pulse"></div>
            <span class="recording-timer" id="recording-timer">00:00</span>
            <span class="recording-text">Enregistrement...</span>
            <button class="recording-stop-btn" id="recording-stop-btn" title="Arrêter et envoyer">
                <i class="fas fa-stop"></i>
            </button>
            <button class="recording-cancel-btn" id="recording-cancel-btn" title="Annuler">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
        <!-- input مخفي لرفع الصور -->
        <input type="file" id="chat-img-input" accept="image/*" style="display:none;">

        <!-- Attachment Menu (Bottom Sheet) -->
        <div class="attachment-bottom-sheet" id="attachment-menu">
            <div class="attach-option" id="attach-photo-btn">
                <div class="attach-icon-wrapper attach-icon-photo">
                    <i class="fas fa-image"></i>
                </div>
                <span class="attach-label">photo</span>
            </div>
            <div class="attach-option" id="attach-videochat-btn">
                <div class="attach-icon-wrapper attach-icon-videochat">
                    <i class="fas fa-video"></i>
                </div>
                <span class="attach-label">vidéo chat</span>
            </div>
            <div class="attach-option" id="attach-gift-btn">
                <div class="attach-icon-wrapper attach-icon-gift">
                    <i class="fas fa-gift"></i>
                </div>
                <span class="attach-label">cadeau</span>
            </div>
            <div class="attach-option" id="attach-video-btn">
                <div class="attach-icon-wrapper attach-icon-video">
                    <i class="fas fa-film"></i>
                </div>
                <span class="attach-label">envoyer vidéo</span>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
        <script src="feed.js?v=4.0" defer></script>
        <script src="map.js?v=2.0" defer></script>
        <script src="script.js?v=3.2" defer></script>
</body>

</html>
